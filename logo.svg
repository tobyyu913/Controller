<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- == LEFT SIDE == -->

  <!-- L2 trigger -->
  <rect x="22" y="88" width="58" height="32" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="51" y="109" text-anchor="middle" font-family="SF Pro, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#888">L2</text>

  <!-- L1 bumper -->
  <rect x="88" y="92" width="58" height="26" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="117" y="110" text-anchor="middle" font-family="SF Pro, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#888">L1</text>

  <!-- D-Pad -->
  <g transform="translate(115, 210)">
    <!-- Up -->
    <rect x="-21" y="-50" width="42" height="42" rx="8" fill="rgba(255,255,255,0.06)"/>
    <text x="0" y="-22" text-anchor="middle" font-size="18" fill="#888">&#9650;</text>
    <!-- Down -->
    <rect x="-21" y="8" width="42" height="42" rx="8" fill="rgba(255,255,255,0.06)"/>
    <text x="0" y="36" text-anchor="middle" font-size="18" fill="#888">&#9660;</text>
    <!-- Left -->
    <rect x="-63" y="-21" width="42" height="42" rx="8" fill="rgba(255,255,255,0.06)"/>
    <text x="-42" y="7" text-anchor="middle" font-size="18" fill="#888">&#9664;</text>
    <!-- Right -->
    <rect x="21" y="-21" width="42" height="42" rx="8" fill="rgba(255,255,255,0.06)"/>
    <text x="42" y="7" text-anchor="middle" font-size="18" fill="#888">&#9654;</text>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="rgba(255,255,255,0.03)"/>
  </g>

  <!-- Left Stick -->
  <g transform="translate(115, 370)">
    <circle cx="0" cy="0" r="52" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="0" cy="0" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>

  <!-- == CENTER == -->

  <!-- Create button (2cm/~56px left of touchpad) -->
  <rect x="150" y="92" width="40" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
  <text x="170" y="108" text-anchor="middle" font-family="SF Pro, Helvetica, sans-serif" font-size="6" font-weight="500" fill="#888">Create</text>

  <!-- Touchpad (centered) -->
  <rect x="206" y="85" width="100" height="38" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Options button (2cm/~56px right of touchpad) -->
  <rect x="322" y="92" width="40" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
  <text x="342" y="108" text-anchor="middle" font-family="SF Pro, Helvetica, sans-serif" font-size="6" font-weight="500" fill="#888">Options</text>

  <!-- PS Button -->
  <circle cx="256" cy="370" r="18" fill="rgba(255,255,255,0.06)" stroke="rgba(68,136,255,0.4)" stroke-width="1.5"/>
  <text x="256" y="375" text-anchor="middle" font-family="SF Pro, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#4488ff">PS</text>
  <circle cx="256" cy="370" r="24" fill="none" stroke="rgba(68,136,255,0.15)" stroke-width="1"/>

  <!-- == RIGHT SIDE == -->

  <!-- R1 bumper (~56px right of Options) -->
  <rect x="378" y="92" width="58" height="26" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="407" y="110" text-anchor="middle" font-family="SF Pro, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#888">R1</text>

  <!-- R2 trigger -->
  <rect x="444" y="88" width="58" height="32" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="473" y="109" text-anchor="middle" font-family="SF Pro, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#888">R2</text>

  <!-- Face Buttons -->
  <g transform="translate(397, 210)">
    <!-- Triangle (top) - green -->
    <circle cx="0" cy="-44" r="22" fill="rgba(255,255,255,0.06)" stroke="#50c878" stroke-width="2"/>
    <polygon points="0,-57 -12,-36 12,-36" fill="none" stroke="#50c878" stroke-width="2" stroke-linejoin="round"/>

    <!-- Circle (right) - red -->
    <circle cx="44" cy="0" r="22" fill="rgba(255,255,255,0.06)" stroke="#ff4444" stroke-width="2"/>
    <circle cx="44" cy="0" r="9" fill="none" stroke="#ff4444" stroke-width="2"/>

    <!-- Cross (bottom) - blue -->
    <circle cx="0" cy="44" r="22" fill="rgba(255,255,255,0.06)" stroke="#4488ff" stroke-width="2"/>
    <text x="0" y="50" text-anchor="middle" font-size="18" font-weight="bold" fill="#4488ff">&#10005;</text>

    <!-- Square (left) - pink -->
    <circle cx="-44" cy="0" r="22" fill="rgba(255,255,255,0.06)" stroke="#ff77aa" stroke-width="2"/>
    <rect x="-52" y="-8" width="16" height="16" rx="1" fill="none" stroke="#ff77aa" stroke-width="2"/>
  </g>

  <!-- Right Stick -->
  <g transform="translate(397, 370)">
    <circle cx="0" cy="0" r="52" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="0" cy="0" r="28" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>

  <!-- Connection dot (top center) -->
  <circle cx="224" cy="52" r="4" fill="#50c878"/>
  <text x="234" y="56" text-anchor="start" font-family="SF Mono, monospace" font-size="10" fill="#888">Connected</text>

  <!-- App name at bottom -->
  <text x="256" y="472" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="28" font-weight="700" letter-spacing="4" fill="rgba(255,255,255,0.8)">CONTROLLER</text>
</svg>
